name: CI — User Service

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'user-service/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'user-service/**'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Configurare Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Rulare teste (user-service)
        working-directory: user-service
        run: mvn test -B

      - name: Build JAR (user-service)
        working-directory: user-service
        run: mvn package -B -DskipTests

      - name: Upload raport JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: user-service/target/site/jacoco/
          retention-days: 7

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: user-service-jar
          path: user-service/target/*.jar
          retention-days: 7
