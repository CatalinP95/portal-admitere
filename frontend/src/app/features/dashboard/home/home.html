<div class="welcome-header">
  <div>
    <h1>Bun venit, <span class="highlight">{{ username }}</span>!</h1>
    <p>Gestionează procesul tău din acest panou.</p>
  </div>
  <div class="role-badge" [class.admin]="role === 'ADMIN'" [class.secretariat]="role === 'SECRETARIAT'">
    {{ role }}
  </div>
</div>

<div class="cards-grid">
  <div class="stat-card">
    <div class="stat-icon blue">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
    </div>
    <div class="stat-body">
      <div class="stat-label">Dosare active</div>
      <div class="stat-value">—</div>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-icon violet">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
    </div>
    <div class="stat-body">
      <div class="stat-label">Status admitere</div>
      <div class="stat-value">—</div>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-icon green">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <div class="stat-body">
      <div class="stat-label">Cazare</div>
      <div class="stat-value">—</div>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-icon orange">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </div>
    <div class="stat-body">
      <div class="stat-label">Notificări</div>
      <div class="stat-value">—</div>
    </div>
  </div>
</div>

<div class="modules-section">
  <h2>Module disponibile</h2>
  <div class="modules-grid">
    <a routerLink="/dashboard/announcements" class="module-card">
      <div class="module-icon">📣</div>
      <div class="module-name">Anunțuri</div>
      <div class="module-tag active-tag">Disponibil</div>
    </a>

    <a *ngIf="isAdmin" routerLink="/dashboard/users" class="module-card">
      <div class="module-icon">👥</div>
      <div class="module-name">Utilizatori</div>
      <div class="module-tag active-tag">Disponibil</div>
    </a>

    <div class="module-card coming">
      <div class="module-icon">📋</div>
      <div class="module-name">Admitere</div>
      <div class="module-tag">În curând</div>
    </div>

    <div class="module-card coming">
      <div class="module-icon">🏠</div>
      <div class="module-name">Cazare</div>
      <div class="module-tag">În curând</div>
    </div>

    <div class="module-card coming">
      <div class="module-icon">👤</div>
      <div class="module-name">Profil</div>
      <div class="module-tag">În curând</div>
    </div>
  </div>
</div>
