server:
  port: 8080

spring:
  config:
    import: "optional:configserver:*"
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/auth/**, /api/users/**, /api/profile/**, /api/menu/**, /api/announcements/**, /api/algorithm/**
          filters:
            - name: JwtGatewayFilter
        - id: user-service-public
          uri: lb://user-service
          predicates:
            - Path=/auth/login, /auth/register, /auth/refresh
        - id: admissions-service
          uri: lb://admissions-service
          predicates:
            - Path=/admissions/**, /secretariat/**
          filters:
            - name: JwtGatewayFilter
        - id: dormitory-service
          uri: lb://dormitory-service
          predicates:
            - Path=/camin/**, /student-camin/**
          filters:
            - name: JwtGatewayFilter
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
